<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Clean Your Car"/>
<title>Clean Your Car</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0a0a0a;--bg2:#111111;--bg3:#1a1a1a;--card:#141414;
  --border:rgba(160,100,255,0.15);--accent:#a050ff;--accent-l:rgba(160,80,255,0.12);
  --green:#22c98a;--green-l:rgba(34,201,138,0.12);
  --amber:#f5a623;--amber-l:rgba(245,166,35,0.12);
  --red:#f25f5c;--red-l:rgba(242,95,92,0.12);
  --text:#f0f0f0;--muted:#777;--dim:#444;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
button,label{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;font-size:15px;width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--border);background:var(--bg3);color:var(--text);outline:none;box-sizing:border-box;}
textarea{resize:none;min-height:70px;}
#app{display:flex;flex-direction:column;min-height:100vh;}
#content{flex:1;overflow-y:auto;padding-bottom:80px;padding-top:env(safe-area-inset-top);}
#tabbar{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,10,0.97);border-top:1px solid rgba(160,80,255,0.2);display:flex;padding-bottom:env(safe-area-inset-bottom);}
.tab-btn{flex:1;background:transparent;border:none;padding:10px 0 4px;display:flex;flex-direction:column;align-items:center;gap:3px;color:rgba(255,255,255,0.3);}
.tab-label{font-size:10px;font-weight:600;}
.tab-dot{width:4px;height:4px;border-radius:2px;background:var(--accent);display:none;margin-top:1px;}
.tab-btn.active{color:var(--accent);}
.tab-btn.active .tab-dot{display:block;}
.page{display:none;}.page.active{display:block;}
.page-header{padding:20px 20px 16px;display:flex;justify-content:space-between;align-items:center;}
.page-title{font-size:22px;font-weight:800;}
.btn-accent{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:6px 14px;font-weight:700;font-size:12px;box-shadow:0 0 10px rgba(160,80,255,0.4);}
.btn-primary{background:var(--accent);color:#fff;border:none;border-radius:14px;padding:14px;font-size:15px;font-weight:700;width:100%;box-shadow:0 0 16px rgba(160,80,255,0.4);}
.btn-danger{background:var(--red-l);border:1px solid rgba(242,95,92,0.3);border-radius:12px;padding:13px 16px;color:var(--red);font-weight:700;font-size:13px;}
.btn-ghost{background:transparent;border:1px solid var(--border);border-radius:8px;padding:5px 13px;color:var(--text);font-weight:500;font-size:13px;}
.row-item{display:flex;align-items:center;gap:12px;padding:12px 20px;cursor:pointer;border-bottom:1px solid var(--border);}
.badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;}
.badge-green{background:var(--green-l);color:var(--green);}
.badge-amber{background:var(--amber-l);color:var(--amber);}
.empty{margin:0 20px;background:var(--card);border-radius:16px;padding:18px;text-align:center;color:var(--dim);font-size:14px;}
.fld{margin-bottom:14px;}
.fld label{font-size:11px;color:var(--muted);font-weight:700;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.05em;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;display:flex;flex-direction:column;justify-content:flex-end;}
.sheet{background:var(--bg2);border-radius:24px 24px 0 0;max-height:88vh;display:flex;flex-direction:column;}
.sheet-handle{display:flex;justify-content:center;padding:10px 0 0;}
.sheet-handle div{width:36px;height:4px;border-radius:2px;background:var(--dim);}
.sheet-header{display:flex;justify-content:space-between;align-items:center;padding:12px 20px 10px;}
.sheet-title{font-weight:700;font-size:17px;}
.sheet-close{background:var(--bg3);border:none;border-radius:20px;width:28px;height:28px;color:var(--muted);font-size:14px;display:flex;align-items:center;justify-content:center;}
.sheet-body{overflow-y:auto;padding:0 20px 40px;}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;}
.confirm-box{background:var(--bg2);border-radius:20px;padding:24px 20px;width:100%;max-width:300px;text-align:center;border:1px solid var(--border);}
.toast{position:fixed;top:calc(20px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);z-index:300;background:var(--accent);color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;font-weight:700;white-space:nowrap;display:none;}
.toggle{width:28px;height:16px;border-radius:8px;background:var(--dim);position:relative;cursor:pointer;flex-shrink:0;transition:background 0.2s;}
.toggle.on{background:var(--accent);}
.toggle div{position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:6px;background:#fff;transition:left 0.2s;}
.toggle.on div{left:14px;}
.prestation-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.prest-card{padding:12px;border-radius:12px;border:2px solid var(--border);background:var(--bg3);cursor:pointer;text-align:center;}
.prest-card.selected{border-color:var(--accent);background:var(--accent-l);}
.prest-card .pname{font-size:12px;font-weight:700;margin-bottom:2px;}
.prest-card.selected .pname{color:var(--accent);}
.prest-card .pprix{font-size:16px;font-weight:800;color:var(--muted);}
.prest-card.selected .pprix{color:var(--accent);}
.pay-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.pay-card{padding:10px;border-radius:12px;border:2px solid var(--border);background:var(--bg3);cursor:pointer;text-align:center;font-size:13px;font-weight:700;color:var(--muted);}
.pay-card.paye{border-color:var(--green);background:var(--green-l);color:var(--green);}
.pay-card.nonpaye{border-color:var(--amber);background:var(--amber-l);color:var(--amber);}
.hours{display:flex;flex-wrap:wrap;gap:6px;}
.hour-btn{padding:8px 12px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;font-weight:700;}
.hour-btn.selected{border-color:var(--accent);background:var(--accent-l);color:var(--accent);}
.hour-btn.taken{border-color:transparent;background:var(--bg);color:var(--dim);cursor:not-allowed;}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;}
.stat-box{border-radius:14px;padding:12px 10px;text-align:center;}
.stat-val{font-size:18px;font-weight:800;line-height:1;margin-bottom:4px;}
.stat-label{font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-day{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;}
.cal-day.today{background:var(--accent-l);}
.cal-day.selected{background:var(--accent);}
.cal-day span{font-size:13px;}
.cal-day.today span{color:var(--accent);font-weight:700;}
.cal-day.selected span{color:#fff;font-weight:700;}
.cal-dot{width:4px;height:4px;border-radius:2px;background:var(--accent);margin-top:1px;}
.cal-day.selected .cal-dot{background:#fff;}
.home-header{padding:calc(20px + env(safe-area-inset-top)) 20px 24px;background:linear-gradient(160deg,#1a0a2e 0%,#0a0a0a 100%);}
.garage-photo{width:54px;height:54px;border-radius:14px;flex-shrink:0;overflow:hidden;border:1px solid var(--border);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:26px;}
.garage-photo img{width:100%;height:100%;object-fit:cover;}
.photo-preview{width:90px;height:90px;border-radius:20px;overflow:hidden;border:2px dashed var(--border);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:10px;}
.photo-preview img{width:100%;height:100%;object-fit:cover;}
.export-row{padding:0 20px 30px;display:flex;gap:10px;}
.export-btn{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px;color:var(--text);font-size:13px;font-weight:700;text-align:center;}
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<div id="app">
  <div id="content">
    <div id="page-home" class="page active"></div>
    <div id="page-calendar" class="page"></div>
    <div id="page-clients" class="page"></div>
    <div id="page-vehicules" class="page"></div>
    <div id="page-garages" class="page"></div>
  </div>
  <div id="tabbar">
    <button class="tab-btn" onclick="setTab('clients',this)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span class="tab-label">Clients</span><div class="tab-dot"></div>
    </button>
    <button class="tab-btn" onclick="setTab('calendar',this)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span class="tab-label">Agenda</span><div class="tab-dot"></div>
    </button>
    <button class="tab-btn active" onclick="setTab('home',this)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span class="tab-label">Accueil</span><div class="tab-dot"></div>
    </button>
    <button class="tab-btn" onclick="setTab('vehicules',this)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
      <span class="tab-label">Vehicules</span><div class="tab-dot"></div>
    </button>
    <button class="tab-btn" onclick="setTab('garages',this)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
      <span class="tab-label">Garages</span><div class="tab-dot"></div>
    </button>
  </div>
</div>
<div id="modal-container"></div>

<script>
var PRESTATIONS=[{id:'express',nom:'Formule Express',prix:35},{id:'complete',nom:'Formule Complete',prix:55}];
var OPTIONS=[{id:'jantes',nom:'Nettoyage jantes',prix:7}];
var HOURS=['08:00','09:00','10:00','11:00','13:00','14:00','15:00','16:00','17:00'];
var MONTHS=['Janvier','Fevrier','Mars','Avril','Mai','Juin','Juillet','Aout','Septembre','Octobre','Novembre','Decembre'];
var DAYS=['L','M','M','J','V','S','D'];
var DB={clients:[],vehicules:[],rdvs:[],garages:[]};
var calMonth=new Date().getMonth();
var calYear=new Date().getFullYear();
var selDay=null;
var _rdvPrest='express';
var _rdvOpts=[];
var _rdvPay='non paye';
var _rdvHeure='';
var _rdvId='';
var _garageId='';
var _garagePhoto='';

function genId(){return Math.random().toString(36).slice(2,9);}
function saveDB(){localStorage.setItem('cleanyourcar',JSON.stringify(DB));}
function loadDB(){try{var d=localStorage.getItem('cleanyourcar');if(d)DB=JSON.parse(d);}catch(e){}}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(function(){t.style.display='none';},2200);}
function hueFor(nom){return nom.charCodeAt(0)*7%360;}
function avatarHtml(nom,size){
  var i=nom.split(' ').map(function(x){return x[0];}).join('').slice(0,2).toUpperCase();
  var h=hueFor(nom);
  return '<div class="avatar" style="width:'+size+'px;height:'+size+'px;font-size:'+(size*0.36)+'px;background:hsl('+h+',45%,22%);color:hsl('+h+',70%,65%);border:1px solid hsl('+h+',45%,32%)">'+i+'</div>';
}
function badgeHtml(p){
  if(p==='paye')return '<span class="badge badge-green">paye</span>';
  return '<span class="badge badge-amber">non paye</span>';
}
function calcPrix(prest,opts){
  var p=PRESTATIONS.find(function(x){return x.id===prest;})||{prix:0};
  var o=(opts||[]).reduce(function(s,id){var x=OPTIONS.find(function(o){return o.id===id;});return s+(x?x.prix:0);},0);
  return p.prix+o;
}

function setTab(tab,btn){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  document.getElementById('page-'+tab).classList.add('active');
  if(btn)btn.classList.add('active');
  renderPage(tab);
}
function renderPage(tab){
  if(tab==='home')renderHome();
  else if(tab==='calendar')renderCalendar();
  else if(tab==='clients')renderClients('');
  else if(tab==='vehicules')renderVehicules();
  else if(tab==='garages')renderGarages();
}
function renderActive(){
  var a=document.querySelector('.page.active');
  if(a)renderPage(a.id.replace('page-',''));
}

function renderHome(){
  var today=new Date().toISOString().slice(0,10);
  var todayRdvs=DB.rdvs.filter(function(r){return r.date===today;});
  var upcoming=DB.rdvs.filter(function(r){return r.date>=today;}).sort(function(a,b){return a.date>b.date?1:-1;}).slice(0,3);
  var h='<div class="home-header">';
  h+='<div style="font-size:26px;font-weight:800;letter-spacing:-0.03em;margin-bottom:20px">Clean Your Car</div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">';
  h+='<div class="stat-box" style="background:var(--accent-l);border:1px solid rgba(160,80,255,0.13);grid-column:span 2"><div class="stat-val" style="color:var(--accent)">'+DB.clients.length+'</div><div class="stat-label">Clients</div></div>';
  h+='<div class="stat-box" style="background:var(--amber-l);border:1px solid rgba(245,166,35,0.13)"><div class="stat-val" style="color:var(--amber)">'+DB.rdvs.length+'</div><div class="stat-label">RDV total</div></div>';
  h+='</div></div>';
  h+='<div style="padding:16px 20px"><button class="btn-primary" onclick="openRdvForm(\'\')">+ Nouveau rendez-vous</button></div>';
  h+='<div style="margin-bottom:24px"><div style="display:flex;justify-content:space-between;align-items:center;padding:0 20px;margin-bottom:10px"><span style="font-size:17px;font-weight:700">Aujourd\'hui</span></div>';
  if(todayRdvs.length===0)h+='<div class="empty">Aucun RDV aujourd\'hui</div>';
  else todayRdvs.forEach(function(r){h+=rdvRowHtml(r);});
  h+='</div>';
  h+='<div style="margin-bottom:24px"><div style="display:flex;justify-content:space-between;align-items:center;padding:0 20px;margin-bottom:10px"><span style="font-size:17px;font-weight:700">A venir</span></div>';
  if(upcoming.length===0)h+='<div class="empty">Aucun RDV a venir</div>';
  else upcoming.forEach(function(r){h+=rdvRowHtml(r);});
  h+='</div>';
  h+='<div class="export-row">';
  h+='<button class="export-btn" onclick="exportData()">Exporter</button>';
  h+='<label class="export-btn"><input type="file" accept=".json" onchange="importData(this)" style="display:none"/>Importer</label>';
  h+='</div>';
  document.getElementById('page-home').innerHTML=h;
}

function rdvRowHtml(r){
  var cl=DB.clients.find(function(c){return c.id===r.client_id;})||{nom:'?'};
  var ve=DB.vehicules.find(function(v){return v.id===r.vehicule_id;})||{marque:'',modele:''};
  var pr=PRESTATIONS.find(function(p){return p.id===r.prestation_id;})||{nom:''};
  var h='<div class="row-item" onclick="openRdvForm(\''+r.id+'\')">>';
  h+='<div style="width:44px;height:44px;border-radius:12px;background:var(--accent-l);display:flex;align-items:center;justify-content:center;flex-shrink:0"><span style="font-size:11px;font-weight:800;color:var(--accent)">'+r.heure+'</span></div>';
  h+='<div style="flex:1;min-width:0"><div style="font-weight:700;font-size:14px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+cl.nom+'</div>';
  h+='<div style="font-size:12px;color:var(--muted)">'+ve.marque+' '+ve.modele+' - '+pr.nom+'</div></div>';
  h+='<div style="text-align:right"><div style="font-size:14px;font-weight:700;color:var(--green);margin-bottom:3px">'+r.prix_total+'euro</div>'+badgeHtml(r.paiement)+'</div>';
  h+='</div>';
  return h;
}

function renderCalendar(){
  var firstDay=new Date(calYear,calMonth,1).getDay();
  var daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  var offset=firstDay===0?6:firstDay-1;
  var today=new Date();
  var h='<div style="padding:20px 20px 12px;display:flex;justify-content:space-between;align-items:center">';
  h+='<div style="font-size:22px;font-weight:800">'+MONTHS[calMonth]+'</div>';
  h+='<div style="display:flex;gap:8px;align-items:center">';
  h+='<button class="btn-ghost" onclick="calPrev()">prev</button>';
  h+='<span style="font-size:14px;font-weight:600;color:var(--muted);min-width:36px;text-align:center">'+calYear+'</span>';
  h+='<button class="btn-ghost" onclick="calNext()">suiv</button>';
  h+='</div></div>';
  h+='<div style="padding:0 20px 12px">';
  h+='<div style="display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px">';
  DAYS.forEach(function(d){h+='<div style="text-align:center;font-size:11px;font-weight:700;color:var(--dim);padding:4px 0">'+d+'</div>';});
  h+='</div><div class="cal-grid">';
  for(var i=0;i<42;i++){
    var day=i-offset+1;
    var valid=day>=1&&day<=daysInMonth;
    if(!valid){h+='<div></div>';continue;}
    var ds=calYear+'-'+pad(calMonth+1)+'-'+pad(day);
    var dr=DB.rdvs.filter(function(r){return r.date===ds;});
    var isToday=today.getDate()===day&&today.getMonth()===calMonth&&today.getFullYear()===calYear;
    var isSel=selDay===day;
    var cls='cal-day'+(isToday?' today':'')+(isSel?' selected':'');
    h+='<div class="'+cls+'" onclick="selDay='+(isSel?'null':day)+';renderCalendar()"><span>'+day+'</span>'+(dr.length>0?'<div class="cal-dot"></div>':'')+'</div>';
  }
  h+='</div></div>';
  h+='<div style="border-top:1px solid var(--border);padding-top:16px">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:0 20px;margin-bottom:10px">';
  h+='<span style="font-weight:700;font-size:15px">'+(selDay?selDay+' '+MONTHS[calMonth]:'Tous les RDV')+'</span>';
  h+='<button class="btn-accent" onclick="openRdvForm(\'\')">+ Ajouter</button></div>';
  var list=selDay?DB.rdvs.filter(function(r){return r.date===calYear+'-'+pad(calMonth+1)+'-'+pad(selDay);}):DB.rdvs.slice().sort(function(a,b){return a.date>b.date?1:-1;});
  if(list.length===0)h+='<div class="empty">Aucun RDV</div>';
  else list.forEach(function(r){h+=rdvRowHtml(r);});
  h+='</div>';
  document.getElementById('page-calendar').innerHTML=h;
}
function pad(n){return String(n).padStart(2,'0');}
function calPrev(){calMonth===0?(calMonth=11,calYear--):(calMonth--);selDay=null;renderCalendar();}
function calNext(){calMonth===11?(calMonth=0,calYear++):(calMonth++);selDay=null;renderCalendar();}

function renderClients(search){
  var filtered=DB.clients.filter(function(c){return c.nom.toLowerCase().indexOf((search||'').toLowerCase())>=0||c.telephone.indexOf(search||'')>=0;});
  var h='<div class="page-header"><div class="page-title">Clients</div><button class="btn-accent" onclick="openClientForm(\'\')">+ Nouveau</button></div>';
  h+='<div style="padding:0 20px 12px"><input placeholder="Rechercher..." oninput="renderClients(this.value)" value="'+(search||'')+'"/></div>';
  if(filtered.length===0)h+='<div class="empty">Aucun client</div>';
  filtered.forEach(function(c){
    var crdvs=DB.rdvs.filter(function(r){return r.client_id===c.id;});
    var total=crdvs.reduce(function(s,r){return s+r.prix_total;},0);
    h+='<div class="row-item" onclick="openClientForm(\''+c.id+'\')">';
    h+=avatarHtml(c.nom,44);
    h+='<div style="flex:1;min-width:0"><div style="font-weight:700;font-size:14px;margin-bottom:2px">'+c.nom+'</div>';
    h+='<div style="font-size:12px;color:var(--muted)">'+c.telephone+'</div>';
    if(c.notes)h+='<div style="font-size:11px;color:var(--amber);margin-top:2px">'+c.notes+'</div>';
    h+='</div><div style="text-align:right"><div style="font-size:14px;font-weight:700;color:var(--green);margin-bottom:2px">'+total+'e</div>';
    h+='<div style="font-size:11px;color:var(--dim)">'+crdvs.length+' RDV</div></div></div>';
  });
  document.getElementById('page-clients').innerHTML=h;
}

function renderVehicules(){
  var h='<div class="page-header"><div class="page-title">Vehicules</div><button class="btn-accent" onclick="openVehiculeForm(\'\')">+ Nouveau</button></div>';
  if(DB.vehicules.length===0)h+='<div class="empty">Aucun vehicule</div>';
  DB.vehicules.forEach(function(v){
    var cl=DB.clients.find(function(c){return c.id===v.client_id;})||{nom:'?'};
    h+='<div class="row-item" onclick="openVehiculeForm(\''+v.id+'\')">>';
    h+='<div style="width:44px;height:44px;border-radius:12px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">&#128663;</div>';
    h+='<div style="flex:1;min-width:0"><div style="font-weight:700;font-size:14px;margin-bottom:2px">'+v.marque+' '+v.modele+'</div>';
    h+='<div style="font-size:12px;color:var(--muted)">'+v.couleur+(v.immatriculation?' - '+v.immatriculation:'')+'</div></div>';
    h+='<div style="text-align:right"><div style="font-size:12px;color:var(--muted)">'+cl.nom.split(' ')[0]+'</div>';
    if(v.kilometrage)h+='<div style="font-size:11px;color:var(--dim);margin-top:3px">'+v.kilometrage+' km</div>';
    h+='</div></div>';
  });
  document.getElementById('page-vehicules').innerHTML=h;
}

function renderGarages(){
  var h='<div class="page-header"><div class="page-title">Garages</div><button class="btn-accent" onclick="openGarageForm(\'\')">+ Nouveau</button></div>';
  if(DB.garages.length===0)h+='<div class="empty">Aucun garage</div>';
  DB.garages.forEach(function(g){
    h+='<div class="row-item" onclick="openGarageForm(\''+g.id+'\')">>';
    h+='<div class="garage-photo">'+(g.photo?'<img src="'+g.photo+'"/>':'&#127978;')+'</div>';
    h+='<div style="flex:1;min-width:0"><div style="font-weight:700;font-size:15px;margin-bottom:3px">'+g.nom+'</div>';
    h+='<div style="font-size:12px;color:var(--muted);margin-bottom:2px">'+g.contact+'</div>';
    h+='<div style="font-size:12px;color:var(--accent)">'+g.telephone+'</div></div>';
    if(g.notes)h+='<div style="width:8px;height:8px;border-radius:4px;background:var(--amber);flex-shrink:0"></div>';
    h+='</div>';
  });
  document.getElementById('page-garages').innerHTML=h;
}

function closeModal(){document.getElementById('modal-container').innerHTML='';}

function confirmDelete(msg,id,type){
  var h='<div class="confirm-overlay"><div class="confirm-box">';
  h+='<div style="font-size:32px;margin-bottom:12px">&#128465;</div>';
  h+='<div style="font-weight:700;font-size:16px;margin-bottom:8px;color:var(--text)">Confirmer</div>';
  h+='<div style="font-size:13px;color:var(--muted);margin-bottom:20px">'+msg+'</div>';
  h+='<div style="display:flex;gap:10px">';
  h+='<button style="flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px;color:var(--text);font-weight:700;font-size:14px" onclick="closeConfirm()">Annuler</button>';
  h+='<button style="flex:1;background:var(--red);border:none;border-radius:12px;padding:12px;color:#fff;font-weight:700;font-size:14px" onclick="doDelete(\''+id+'\',\''+type+'\')">Supprimer</button>';
  h+='</div></div></div>';
  document.getElementById('modal-container').innerHTML+=h;
}
function closeConfirm(){var c=document.querySelector('.confirm-overlay');if(c)c.remove();}
function doDelete(id,type){
  if(type==='rdv'){DB.rdvs=DB.rdvs.filter(function(r){return r.id!==id;});showToast('Supprime');}
  else if(type==='client'){DB.clients=DB.clients.filter(function(c){return c.id!==id;});DB.vehicules=DB.vehicules.filter(function(v){return v.client_id!==id;});DB.rdvs=DB.rdvs.filter(function(r){return r.client_id!==id;});showToast('Supprime');}
  else if(type==='vehicule'){DB.vehicules=DB.vehicules.filter(function(v){return v.id!==id;});DB.rdvs=DB.rdvs.filter(function(r){return r.vehicule_id!==id;});showToast('Supprime');}
  else if(type==='garage'){DB.garages=DB.garages.filter(function(g){return g.id!==id;});showToast('Supprime');}
  saveDB();closeModal();renderActive();
}

function sheetHtml(title,body){
  var h='<div class="modal-overlay" onclick="if(event.target===this)closeModal()">';
  h+='<div class="sheet"><div class="sheet-handle"><div></div></div>';
  h+='<div class="sheet-header"><span class="sheet-title">'+title+'</span>';
  h+='<button class="sheet-close" onclick="closeModal()">x</button></div>';
  h+='<div class="sheet-body">'+body+'</div></div></div>';
  return h;
}
function fld(label,content){return '<div class="fld"><label>'+label+'</label>'+content+'</div>';}

function openRdvForm(id){
  _rdvId=id||'';
  var rdv=id?DB.rdvs.find(function(r){return r.id===id;}):null;
  _rdvPrest=rdv?rdv.prestation_id:'express';
  _rdvOpts=rdv?rdv.option_ids:[];
  _rdvPay=rdv?rdv.paiement:'non paye';
  _rdvHeure=rdv?rdv.heure:'';
  var cOpts='<option value="">Selectionner...</option>';
  DB.clients.forEach(function(c){cOpts+='<option value="'+c.id+'"'+(rdv&&rdv.client_id===c.id?' selected':'')+'>'+c.nom+'</option>';});
  var vOpts='<option value="">Selectionner...</option>';
  if(rdv){DB.vehicules.filter(function(v){return v.client_id===rdv.client_id;}).forEach(function(v){vOpts+='<option value="'+v.id+'"'+(rdv.vehicule_id===v.id?' selected':'')+'>'+v.marque+' '+v.modele+'</option>';});}
  var prix=calcPrix(_rdvPrest,_rdvOpts);
  var b='';
  b+=fld('Client *','<select id="f-client" onchange="updateVehicules(this.value)">'+cOpts+'</select>');
  b+='<div id="f-v-wrap" style="'+(rdv?'':'display:none')+'">'+fld('Vehicule *','<select id="f-vehicule">'+vOpts+'</select>')+'</div>';
  b+=fld('Prestation','<div class="prestation-cards">'+PRESTATIONS.map(function(p){return '<div class="prest-card'+(_rdvPrest===p.id?' selected':'')+'" onclick="selectPrest(\''+p.id+'\')"><div class="pname">'+p.nom+'</div><div class="pprix">'+p.prix+'e</div></div>';}).join('')+'</div>');
  b+=fld('Option jantes +7e','<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:12px;background:var(--bg3);border:1px solid var(--border)" onclick="toggleJantes()"><span style="font-size:14px">Nettoyage jantes</span><div class="toggle'+(_rdvOpts.indexOf('jantes')>=0?' on':'')+'" id="toggle-jantes"><div></div></div></div>');
  b+=fld('Date *','<input type="date" id="f-date" value="'+(rdv?rdv.date:'')+'" oninput="renderHours()"/>');
  b+='<div id="f-hours-wrap" class="fld"><label>Horaire *</label><div class="hours" id="f-hours"></div></div>';
  b+=fld('Paiement','<div class="pay-cards"><div class="pay-card'+(_rdvPay==='non paye'?' nonpaye':'')+'" onclick="selectPay(\'non paye\')">Non paye</div><div class="pay-card'+(_rdvPay==='paye'?' paye':'')+'" onclick="selectPay(\'paye\')">Paye</div></div>');
  b+=fld('Notes','<textarea id="f-notes" placeholder="Remarques...">'+(rdv?rdv.notes_admin:'')+'</textarea>');
  b+='<div style="display:flex;gap:10px;margin-top:8px">';
  if(rdv)b+='<button class="btn-danger" onclick="confirmDelete(\'Supprimer ce RDV ?\',\''+id+'\',\'rdv\')">Suppr.</button>';
  b+='<button id="f-save-rdv" class="btn-primary" style="border-radius:14px" onclick="saveRdv()">'+( rdv?'Enregistrer':'Ajouter - '+prix+'e')+'</button></div>';
  document.getElementById('modal-container').innerHTML=sheetHtml(rdv?'Modifier le RDV':'Nouveau RDV',b);
  if(rdv&&rdv.date)renderHours();
}
function updateVehicules(cid){
  var w=document.getElementById('f-v-wrap');
  var s=document.getElementById('f-vehicule');
  var o='<option value="">Selectionner...</option>';
  DB.vehicules.filter(function(v){return v.client_id===cid;}).forEach(function(v){o+='<option value="'+v.id+'">'+v.marque+' '+v.modele+'</option>';});
  s.innerHTML=o;w.style.display=cid?'':'none';
}
function selectPrest(id){
  _rdvPrest=id;
  document.querySelectorAll('.prest-card').forEach(function(c){c.classList.remove('selected');});
  event.currentTarget.classList.add('selected');
  var btn=document.getElementById('f-save-rdv');
  if(btn&&!_rdvId)btn.textContent='Ajouter - '+calcPrix(_rdvPrest,_rdvOpts)+'e';
}
function toggleJantes(){
  var t=document.getElementById('toggle-jantes');
  if(t.classList.contains('on')){t.classList.remove('on');_rdvOpts=[];}
  else{t.classList.add('on');_rdvOpts=['jantes'];}
  var btn=document.getElementById('f-save-rdv');
  if(btn&&!_rdvId)btn.textContent='Ajouter - '+calcPrix(_rdvPrest,_rdvOpts)+'e';
}
function selectPay(p){
  _rdvPay=p;
  document.querySelectorAll('.pay-card').forEach(function(c){c.classList.remove('paye','nonpaye');});
  var cards=document.querySelectorAll('.pay-card');
  if(p==='non paye')cards[0].classList.add('nonpaye');
  else cards[1].classList.add('paye');
}
function renderHours(){
  var d=document.getElementById('f-date');
  if(!d||!d.value)return;
  var booked=DB.rdvs.filter(function(r){return !_rdvId||r.id!==_rdvId;}).map(function(r){return r.date+r.heure;});
  var h='';
  HOURS.forEach(function(hr){
    var taken=booked.indexOf(d.value+hr)>=0;
    var sel=_rdvHeure===hr;
    h+='<button class="hour-btn'+(sel?' selected':'')+(taken?' taken':'')+'" '+(taken?'disabled':'')+' onclick="selectHour(\''+hr+'\')">'+hr+'</button>';
  });
  var c=document.getElementById('f-hours');
  if(c)c.innerHTML=h;
}
function selectHour(h){
  _rdvHeure=h;
  document.querySelectorAll('.hour-btn').forEach(function(b){b.classList.toggle('selected',b.textContent===h);});
}
function saveRdv(){
  var cid=document.getElementById('f-client').value;
  var vid=document.getElementById('f-vehicule').value;
  var date=document.getElementById('f-date').value;
  var notes=document.getElementById('f-notes').value||'';
  if(!cid||!vid||!date||!_rdvHeure){alert('Remplis tous les champs obligatoires');return;}
  var prix=calcPrix(_rdvPrest,_rdvOpts);
  var obj={id:_rdvId||genId(),client_id:cid,vehicule_id:vid,prestation_id:_rdvPrest,option_ids:_rdvOpts,date:date,heure:_rdvHeure,prix_total:prix,paiement:_rdvPay,notes_admin:notes};
  if(_rdvId){DB.rdvs=DB.rdvs.map(function(r){return r.id===_rdvId?obj:r;});showToast('Mis a jour');}
  else{DB.rdvs.push(obj);showToast('RDV ajoute');}
  saveDB();closeModal();renderActive();
}

function openClientForm(id){
  var c=id?DB.clients.find(function(x){return x.id===id;}):null;
  var b='';
  b+=fld('Nom *','<input id="f-nom" value="'+(c?c.nom:'')+'" placeholder="Jean Dupont"/>');
  b+=fld('Telephone *','<input id="f-tel" value="'+(c?c.telephone:'')+'" placeholder="06 00 00 00 00"/>');
  b+=fld('Email','<input id="f-email" value="'+(c?c.email:'')+'" placeholder="jean@mail.com"/>');
  b+=fld('Notes','<textarea id="f-notes" placeholder="Remarques...">'+(c?c.notes:'')+'</textarea>');
  b+='<div style="display:flex;gap:10px;margin-top:8px">';
  if(c)b+='<button class="btn-danger" onclick="confirmDelete(\'Supprimer ce client ?\',\''+id+'\',\'client\')">Suppr.</button>';
  b+='<button class="btn-primary" style="border-radius:14px" onclick="saveClient(\''+( c?id:'')+'\')">'+( c?'Enregistrer':'Ajouter')+'</button></div>';
  document.getElementById('modal-container').innerHTML=sheetHtml(c?'Modifier':'Nouveau client',b);
}
function saveClient(id){
  var nom=document.getElementById('f-nom').value.trim();
  var tel=document.getElementById('f-tel').value.trim();
  if(!nom||!tel){alert('Nom et telephone requis');return;}
  var obj={id:id||genId(),nom:nom,telephone:tel,email:document.getElementById('f-email').value||'',notes:document.getElementById('f-notes').value||'',date_creation:new Date().toISOString().slice(0,10)};
  if(id){DB.clients=DB.clients.map(function(c){return c.id===id?obj:c;});showToast('Client mis a jour');}
  else{DB.clients.push(obj);showToast('Client ajoute');}
  saveDB();closeModal();renderActive();
}

function openVehiculeForm(id){
  var v=id?DB.vehicules.find(function(x){return x.id===id;}):null;
  var cOpts='<option value="">Selectionner...</option>';
  DB.clients.forEach(function(c){cOpts+='<option value="'+c.id+'"'+(v&&v.client_id===c.id?' selected':'')+'>'+c.nom+'</option>';});
  var b='';
  b+=fld('Client *','<select id="f-client">'+cOpts+'</select>');
  b+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">';
  b+=fld('Marque *','<input id="f-marque" value="'+(v?v.marque:'')+'" placeholder="Peugeot"/>');
  b+=fld('Modele *','<input id="f-modele" value="'+(v?v.modele:'')+'" placeholder="308"/>');
  b+='</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">';
  b+=fld('Couleur *','<input id="f-couleur" value="'+(v?v.couleur:'')+'" placeholder="Gris"/>');
  b+=fld('Immatriculation','<input id="f-immat" value="'+(v?v.immatriculation:'')+'" placeholder="AB-123-CD"/>');
  b+='</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">';
  b+=fld('Kilometrage','<input id="f-km" value="'+(v?v.kilometrage:'')+'" placeholder="42000"/>');
  b+=fld('Commentaires','<input id="f-comment" value="'+(v?v.commentaires:'')+'"/>');
  b+='</div><div style="display:flex;gap:10px;margin-top:8px">';
  if(v)b+='<button class="btn-danger" onclick="confirmDelete(\'Supprimer ce vehicule ?\',\''+id+'\',\'vehicule\')">Suppr.</button>';
  b+='<button class="btn-primary" style="border-radius:14px" onclick="saveVehicule(\''+( v?id:'')+'\')">'+( v?'Enregistrer':'Ajouter')+'</button></div>';
  document.getElementById('modal-container').innerHTML=sheetHtml(v?'Modifier':'Nouveau vehicule',b);
}
function saveVehicule(id){
  var cid=document.getElementById('f-client').value;
  var marque=document.getElementById('f-marque').value.trim();
  var modele=document.getElementById('f-modele').value.trim();
  var couleur=document.getElementById('f-couleur').value.trim();
  if(!cid||!marque||!modele||!couleur){alert('Champs obligatoires manquants');return;}
  var obj={id:id||genId(),client_id:cid,marque:marque,modele:modele,couleur:couleur,immatriculation:document.getElementById('f-immat').value||'',kilometrage:document.getElementById('f-km').value||'',commentaires:document.getElementById('f-comment').value||''};
  if(id){DB.vehicules=DB.vehicules.map(function(v){return v.id===id?obj:v;});showToast('Mis a jour');}
  else{DB.vehicules.push(obj);showToast('Vehicule ajoute');}
  saveDB();closeModal();renderActive();
}

function openGarageForm(id){
  _garageId=id||'';
  var g=id?DB.garages.find(function(x){return x.id===id;}):null;
  _garagePhoto=g?g.photo||'':'';
  var b='';
  b+='<div style="display:flex;flex-direction:column;align-items:center;margin-bottom:18px">';
  b+='<div class="photo-preview" id="photo-preview">'+(g&&g.photo?'<img src="'+g.photo+'"/>':'&#127978;')+'</div>';
  b+='<label style="background:var(--accent-l);color:var(--accent);border:1px solid rgba(160,80,255,0.3);border-radius:10px;padding:6px 16px;font-size:13px;font-weight:700;cursor:pointer">Photo<input type="file" accept="image/*" onchange="previewPhoto(this)" style="display:none"/></label></div>';
  b+=fld('Nom du garage *','<input id="f-nom" value="'+(g?g.nom:'')+'" placeholder="Garage Central"/>');
  b+=fld('Contact *','<input id="f-contact" value="'+(g?g.contact:'')+'" placeholder="Pierre Martin"/>');
  b+=fld('Telephone *','<input id="f-tel" value="'+(g?g.telephone:'')+'" placeholder="01 23 45 67 89"/>');
  b+=fld('Notes','<textarea id="f-notes" placeholder="Remises, horaires...">'+(g?g.notes:'')+'</textarea>');
  b+='<div style="display:flex;gap:10px;margin-top:8px">';
  if(g)b+='<button class="btn-danger" onclick="confirmDelete(\'Supprimer ce garage ?\',\''+id+'\',\'garage\')">Suppr.</button>';
  b+='<button class="btn-primary" style="border-radius:14px" onclick="saveGarage()">'+( g?'Enregistrer':'Ajouter')+'</button></div>';
  document.getElementById('modal-container').innerHTML=sheetHtml(g?'Modifier':'Nouveau garage',b);
}
function previewPhoto(input){
  var file=input.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){_garagePhoto=e.target.result;document.getElementById('photo-preview').innerHTML='<img src="'+e.target.result+'"/>';};
  reader.readAsDataURL(file);
}
function saveGarage(){
  var nom=document.getElementById('f-nom').value.trim();
  var contact=document.getElementById('f-contact').value.trim();
  var tel=document.getElementById('f-tel').value.trim();
  if(!nom||!contact||!tel){alert('Champs obligatoires manquants');return;}
  var obj={id:_garageId||genId(),nom:nom,contact:contact,telephone:tel,notes:document.getElementById('f-notes').value||'',photo:_garagePhoto||''};
  if(_garageId){DB.garages=DB.garages.map(function(g){return g.id===_garageId?obj:g;});showToast('Mis a jour');}
  else{DB.garages.push(obj);showToast('Garage ajoute');}
  saveDB();closeModal();renderActive();
}

function exportData(){
  var json=JSON.stringify(DB,null,2);
  var blob=new Blob([json],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download='cleanyourcar-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Sauvegarde exportee');
}
function importData(input){
  var file=input.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      if(data.clients&&data.rdvs&&data.garages){
        DB=data;saveDB();renderActive();showToast('Donnees importees');
      }else{alert('Fichier invalide');}
    }catch(err){alert('Erreur import');}
  };
  reader.readAsText(file);
}

loadDB();
renderHome();
</script>
</body>
</html>
